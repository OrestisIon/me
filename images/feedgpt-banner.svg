<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#1a0a3a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9f7aea" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#e9d8fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="150" rx="280" ry="200" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="650" cy="300" rx="200" ry="160" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#7c3aed" fill-opacity="0.15"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1" fill="none">
    <polyline points="600,0 600,80 680,80 680,160 750,160"/>
    <polyline points="700,0 700,50 760,50"/>
    <polyline points="750,400 750,320 690,320 690,260"/>
    <circle cx="680" cy="80" r="3" fill="#9f7aea" fill-opacity="0.4" stroke="none"/>
    <circle cx="690" cy="260" r="3" fill="#9f7aea" fill-opacity="0.4" stroke="none"/>
    <circle cx="700" cy="50" r="2" fill="#9f7aea" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- RSS wave lines (stylized) -->
  <g transform="translate(60, 220)" opacity="0.5">
    <circle cx="0" cy="0" r="6" fill="#a78bfa"/>
    <path d="M 12 0 A 12 12 0 0 1 0 -12" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 24 0 A 24 24 0 0 1 0 -24" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 38 0 A 38 38 0 0 1 0 -38" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 54 0 A 54 54 0 0 1 0 -54" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- OpenAI icon (scaled, white) -->
  <g transform="translate(630, 48) scale(0.28)" fill="white" opacity="0.85">
    <path d="M239.184 106.203a64.716 64.716 0 0 0-5.576-53.103C219.452 28.459 191 15.784 163.213 21.74A65.586 65.586 0 0 0 52.096 45.22a64.716 64.716 0 0 0-43.23 31.36c-14.31 24.602-11.061 55.634 8.033 76.74a64.665 64.665 0 0 0 5.525 53.102c14.174 24.65 42.644 37.324 70.446 31.36a64.72 64.72 0 0 0 48.754 21.744c28.481.025 53.714-18.361 62.414-45.481a64.767 64.767 0 0 0 43.229-31.36c14.137-24.558 10.875-55.423-8.083-76.483Zm-97.56 136.338a48.397 48.397 0 0 1-31.105-11.255l1.535-.87 51.67-29.825a8.595 8.595 0 0 0 4.247-7.367v-72.85l21.845 12.636c.218.111.37.32.409.563v60.367c-.056 26.818-21.783 48.545-48.601 48.601Zm-104.466-44.61a48.345 48.345 0 0 1-5.781-32.589l1.534.921 51.722 29.826a8.339 8.339 0 0 0 8.441 0l63.181-36.425v25.221a.87.87 0 0 1-.358.665l-52.335 30.184c-23.257 13.398-52.97 5.431-66.404-17.803ZM23.549 85.38a48.499 48.499 0 0 1 25.58-21.333v61.39a8.288 8.288 0 0 0 4.195 7.316l62.874 36.272-21.845 12.636a.819.819 0 0 1-.767 0L41.353 151.53c-23.211-13.454-31.171-43.144-17.804-66.405v.256Zm179.466 41.695-63.08-36.63L161.73 77.86a.819.819 0 0 1 .768 0l52.233 30.184a48.6 48.6 0 0 1-7.316 87.635v-61.391a8.544 8.544 0 0 0-4.4-7.213Zm21.742-32.69-1.535-.922-51.619-30.081a8.39 8.39 0 0 0-8.492 0L99.98 99.808V74.587a.716.716 0 0 1 .307-.665l52.233-30.133a48.652 48.652 0 0 1 72.236 50.391v.205ZM88.061 139.097l-21.845-12.585a.87.87 0 0 1-.41-.614V65.685a48.652 48.652 0 0 1 79.757-37.346l-1.535.87-51.67 29.825a8.595 8.595 0 0 0-4.246 7.367l-.051 72.697Zm11.868-25.58 28.138-16.217 28.188 16.218v32.434l-28.086 16.218-28.188-16.218-.052-32.434Z"/>
  </g>

  <!-- Neural network dots (decorative) -->
  <g fill="#a78bfa" opacity="0.35">
    <circle cx="510" cy="80" r="3"/>
    <circle cx="555" cy="110" r="2.5"/>
    <circle cx="540" cy="150" r="2"/>
    <circle cx="580" cy="70" r="2"/>
    <circle cx="595" cy="130" r="3"/>
    <circle cx="525" cy="190" r="2"/>
  </g>
  <g stroke="#a78bfa" stroke-opacity="0.15" stroke-width="1" fill="none">
    <line x1="510" y1="80" x2="555" y2="110"/>
    <line x1="555" y1="110" x2="540" y2="150"/>
    <line x1="555" y1="110" x2="595" y2="130"/>
    <line x1="510" y1="80" x2="580" y2="70"/>
    <line x1="540" y1="150" x2="525" y2="190"/>
    <line x1="595" y1="130" x2="525" y2="190"/>
  </g>

  <!-- Main title -->
  <text x="110" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#titleGrad)">FeedGPT</text>

  <!-- Subtitle -->
  <text x="112" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#c4b5fd" opacity="0.75" letter-spacing="0.5">AI-Powered RSS Reader with LLM &amp; RAG</text>

  <!-- Stat chips -->
  <g transform="translate(112, 250)">
    <!-- Chip 1 -->
    <rect x="0" y="0" width="110" height="30" rx="8" fill="#7c3aed" fill-opacity="0.25" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="55" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.3">4.8/5 Satisfaction</text>
    <!-- Chip 2 -->
    <rect x="120" y="0" width="140" height="30" rx="8" fill="#7c3aed" fill-opacity="0.25" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="190" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.3">+25% Engagement</text>
    <!-- Chip 3 -->
    <rect x="270" y="0" width="80" height="30" rx="8" fill="#7c3aed" fill-opacity="0.25" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="310" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.3">FastAPI</text>
  </g>

  <!-- Tech stack icons row -->
  <g transform="translate(112, 315)" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#9f7aea" opacity="0.6">
    <text x="0" y="0">Python</text>
    <text x="55" y="0">·</text>
    <text x="65" y="0">PostgreSQL</text>
    <text x="155" y="0">·</text>
    <text x="165" y="0">RAG</text>
    <text x="200" y="0">·</text>
    <text x="210" y="0">OpenAI API</text>
  </g>

  <!-- Horizontal rule -->
  <line x1="112" y1="335" x2="460" y2="335" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="112" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#6b46c1" opacity="0.6" letter-spacing="1.5" font-weight="600">PERSONAL PROJECT</text>

  <!-- Right side: abstract data visualization -->
  <g transform="translate(490, 290)" opacity="0.4">
    <rect x="0" y="0" width="8" height="60" rx="2" fill="#a78bfa"/>
    <rect x="14" y="20" width="8" height="40" rx="2" fill="#7c3aed"/>
    <rect x="28" y="10" width="8" height="50" rx="2" fill="#9f7aea"/>
    <rect x="42" y="30" width="8" height="30" rx="2" fill="#c4b5fd"/>
    <rect x="56" y="5" width="8" height="55" rx="2" fill="#7c3aed"/>
    <rect x="70" y="25" width="8" height="35" rx="2" fill="#a78bfa"/>
    <rect x="84" y="15" width="8" height="45" rx="2" fill="#9f7aea"/>
  </g>
</svg>
