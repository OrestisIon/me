<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0704"/>
      <stop offset="100%" stop-color="#1a0a08"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="220" cy="180" rx="295" ry="215" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="660" cy="270" rx="210" ry="170" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#dc2626" fill-opacity="0.13"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Circuit lines -->
  <g stroke="#dc2626" stroke-opacity="0.2" stroke-width="1" fill="none">
    <polyline points="605,0 605,72 685,72 685,152 752,152"/>
    <polyline points="725,400 725,312 672,312 672,242"/>
    <circle cx="685" cy="72" r="3" fill="#f87171" fill-opacity="0.45" stroke="none"/>
    <circle cx="672" cy="242" r="3" fill="#f87171" fill-opacity="0.35" stroke="none"/>
  </g>

  <!-- Network topology diagram -->
  <g transform="translate(472, 52)" opacity="0.82">
    <!-- Central router node -->
    <circle cx="130" cy="90" r="18" fill="#1a0a08" stroke="#f87171" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="130" y="86" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#fca5a5" text-anchor="middle">ROUTER</text>
    <text x="130" y="97" font-family="system-ui, sans-serif" font-size="7" fill="#f87171" text-anchor="middle" opacity="0.7">TCP/IP</text>

    <!-- Spoke nodes -->
    <!-- Node A -->
    <circle cx="50" cy="40" r="12" fill="#1a0a08" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
    <text x="50" y="44" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#fca5a5" text-anchor="middle">PC1</text>
    <line x1="62" y1="46" x2="113" y2="73" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Node B -->
    <circle cx="210" cy="40" r="12" fill="#1a0a08" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
    <text x="210" y="44" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#fca5a5" text-anchor="middle">PC2</text>
    <line x1="198" y1="46" x2="148" y2="73" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Node C -->
    <circle cx="50" cy="150" r="12" fill="#1a0a08" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
    <text x="50" y="154" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#fca5a5" text-anchor="middle">PC3</text>
    <line x1="62" y1="144" x2="113" y2="106" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Node D (attacker) - highlighted red -->
    <circle cx="210" cy="150" r="13" fill="#3b0a0a" stroke="#dc2626" stroke-opacity="0.75" stroke-width="1.5"/>
    <text x="210" y="147" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#fca5a5" text-anchor="middle">THREAT</text>
    <text x="210" y="158" font-family="system-ui, sans-serif" font-size="7" fill="#f87171" text-anchor="middle">⚠</text>
    <line x1="198" y1="144" x2="148" y2="106" stroke="#dc2626" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- IDS sensor box -->
    <rect x="80" y="120" width="98" height="28" rx="5" fill="#2d0a0a" stroke="#f97316" stroke-opacity="0.55" stroke-width="1"/>
    <text x="129" y="132" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#fb923c" text-anchor="middle" letter-spacing="0.5">IDS SENSOR</text>
    <text x="129" y="143" font-family="system-ui, sans-serif" font-size="7" fill="#fca5a5" text-anchor="middle" opacity="0.6">monitoring...</text>

    <!-- Pulse rings on central node -->
    <circle cx="130" cy="90" r="24" fill="none" stroke="#dc2626" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="130" cy="90" r="30" fill="none" stroke="#dc2626" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <!-- Shield icon (IDS concept) -->
  <g transform="translate(62, 58)" opacity="0.8">
    <path d="M38 4 L72 18 L72 50 C72 68 57 80 38 88 C19 80 4 68 4 50 L4 18 Z"
          fill="#1a0a08" stroke="#f87171" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="38" y="44" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fca5a5" text-anchor="middle" letter-spacing="-0.5">IDS</text>
    <!-- Eye in shield -->
    <ellipse cx="38" cy="58" rx="12" ry="7" fill="none" stroke="#f87171" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="38" cy="58" r="4" fill="#dc2626" fill-opacity="0.7"/>
  </g>

  <!-- Main title -->
  <text x="110" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="url(#titleGrad)">Intrusion Detection</text>
  <text x="110" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="url(#titleGrad)">System</text>

  <!-- Subtitle -->
  <text x="112" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#fca5a5" opacity="0.65" letter-spacing="0.3">TCP/IP Protocols &amp; Multithreaded OS Simulation</text>

  <!-- Feature chips -->
  <g transform="translate(112, 258)">
    <rect x="0" y="0" width="105" height="28" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#dc2626" stroke-opacity="0.4" stroke-width="1"/>
    <text x="52" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle" letter-spacing="0.2">Packet Analysis</text>

    <rect x="118" y="0" width="105" height="28" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#dc2626" stroke-opacity="0.4" stroke-width="1"/>
    <text x="170" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle" letter-spacing="0.2">Threading OS</text>

    <rect x="236" y="0" width="90" height="28" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#dc2626" stroke-opacity="0.4" stroke-width="1"/>
    <text x="281" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" text-anchor="middle" letter-spacing="0.2">Live Detection</text>
  </g>

  <!-- Tech stack -->
  <g transform="translate(112, 315)" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#f87171" opacity="0.55">
    <text x="0" y="0">Python</text>
    <text x="52" y="0">·</text>
    <text x="62" y="0">TCP/IP</text>
    <text x="112" y="0">·</text>
    <text x="122" y="0">Multithreading</text>
    <text x="232" y="0">·</text>
    <text x="242" y="0">Networking</text>
  </g>

  <!-- Horizontal rule -->
  <line x1="112" y1="335" x2="460" y2="335" stroke="#dc2626" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="112" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626" opacity="0.55" letter-spacing="1.5" font-weight="600">UNIVERSITY PROJECT</text>
</svg>
